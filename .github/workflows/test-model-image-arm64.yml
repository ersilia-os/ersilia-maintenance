name: Test model image ARM64

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Model ID to test (e.g. eos3mk2)"
        required: true
        type: string
      ersilia_branch:
        description: "Ersilia branch to install from"
        required: false
        default: "master"
        type: string

jobs:
  test-image-arm64:
    runs-on: default-linux-arm64
    continue-on-error: true
    outputs:
      passed: ${{ steps.check-result.outcome }}
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          auto-activate-base: false

      - name: Install dependencies
        env:
          ERSILIA_BRANCH: ${{ inputs.ersilia_branch }}
        run: |
          conda run -n base python -m pip install "ersilia[test] @ git+https://github.com/ersilia-os/ersilia.git@${ERSILIA_BRANCH}"
          
      - name: Reproduce the test run — A) immediate  B) delayed  C) retried
        continue-on-error: true
        env:
          MODEL_ID: ${{ inputs.repo_name }}
        run: |
          conda run --no-capture-output -n base bash -c '
            set +e
            # serve needs the model fetched locally first
            ersilia -v fetch '"$MODEL_ID"' --from_dockerhub --version dev-arm64

            printf "smiles\nCC(C)(C)NCc1ccc(Nc2ccnc3cc(Cl)ccc23)cc1O\nCOc1cc2nccc(Oc3ccc(NC(=O)c4cn(C(C)C)c(=O)n(-c5ccc(F)cc5)c4=O)cc3F)c2cc1OC\nCOc1cc2nccc(Oc3ccc(NC(=O)NC4CC4)c(Cl)c3)c2cc1C(N)=O\n" > /tmp/in.csv
            echo "=== INPUT ==="; cat /tmp/in.csv

            echo; echo "################ A) serve --disable-cache && run -b 100 (immediate = test path) ################"
            ersilia serve '"$MODEL_ID"' --disable-cache && ersilia -v run -i /tmp/in.csv -o /tmp/a.csv -b 100
            echo "----- a.csv -----"; cat /tmp/a.csv 2>&1
            ersilia close

            echo; echo "################ B) serve, sleep 20s, then run ################"
            ersilia serve '"$MODEL_ID"' --disable-cache && sleep 20 && ersilia -v run -i /tmp/in.csv -o /tmp/b.csv -b 100
            echo "----- b.csv -----"; cat /tmp/b.csv 2>&1
            ersilia close

            echo; echo "################ C) serve once, run 3x ################"
            ersilia serve '"$MODEL_ID"' --disable-cache
            for i in 1 2 3; do echo "--- attempt $i ---"; ersilia -v run -i /tmp/in.csv -o /tmp/c.csv -b 100; cat /tmp/c.csv 2>&1; done
            ersilia close
          '


      - name: Test ARM64 image
        env:
          MODEL_ID: ${{ inputs.repo_name }}
        run: |
          conda run --no-capture-output -n base bash -c "
            ersilia -v test $MODEL_ID --deep --from_dockerhub --version dev-arm64 --permissive
          "

      - name: Rename test results JSON
        env:
          MODEL_ID: ${{ inputs.repo_name }}
        run: |
          TEST_JSON="${MODEL_ID}-test.json"

          if [[ ! -f "$TEST_JSON" ]]; then
            echo "Error: Test results file $TEST_JSON not found!"
            exit 1
          fi

          mv "$TEST_JSON" "${MODEL_ID}-test-arm64.json"
          echo "TEST_JSON_ARM64=${MODEL_ID}-test-arm64.json" >> "$GITHUB_ENV"

      - name: Upload logs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-report-arm64
          path: ${{ inputs.repo_name }}-test-arm64.json

      - name: Parse test results
        id: check-result
        env:
          MODEL_ID: ${{ inputs.repo_name }}
        run: |
          TEST_JSON="${MODEL_ID}-test-arm64.json"
          echo "Parsing test results from $TEST_JSON"

          TEST_FAILED=$(jq 'recurse | objects | select(map(select(. == false)) | length > 0)' "$TEST_JSON")
          if [[ -n "$TEST_FAILED" ]]; then
            echo "Some tests failed. Stopping workflow."
            exit 1
          fi
