name: Update Publication Links

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch current values and print diff table without committing"
        required: false
        type: boolean
        default: true
      model_id:
        description: "Limit to a single model ID (leave empty for all models)"
        required: false
        type: string
        default: ""

jobs:
  update-publications:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          auto-activate-base: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pyyaml pyairtable

      - name: Update publication links
        env:
          MAINTENANCE_TOKEN: ${{ secrets.MAINTENANCE_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          MODEL_ID: ${{ github.event.inputs.model_id }}
        run: |
          cd src

          ARGS=(
            --token "${MAINTENANCE_TOKEN}"
            --csv "../files/ErsiliaModelsDOI.csv"
          )

          if [[ "${DRY_RUN}" == "true" ]]; then
            ARGS+=(--dry-run)
          else
            ARGS+=(--output-updated "../files/updated_models.txt")
          fi

          if [[ -n "${MODEL_ID}" ]]; then
            ARGS+=(--model "${MODEL_ID}")
          fi

          python bulk_update_publications.py "${ARGS[@]}"

      - name: Sync updated models to Airtable
        if: github.event.inputs.dry_run != 'true'
        continue-on-error: true
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          MAINTENANCE_TOKEN: ${{ secrets.MAINTENANCE_TOKEN }}
        run: |
          if [[ -z "${AIRTABLE_API_KEY:-}" ]]; then
            echo "AIRTABLE_API_KEY is not set, skipping Airtable sync."
            exit 0
          fi

          if [[ ! -f files/updated_models.txt ]]; then
            echo "No updated_models.txt found — nothing to sync."
            exit 0
          fi

          wget -q https://raw.githubusercontent.com/ersilia-os/ersilia/master/.github/scripts/airtableops.py
          wget -q https://raw.githubusercontent.com/ersilia-os/ersilia/master/.github/scripts/readme_formatter.py

          while IFS= read -r MODEL_ID; do
            [[ -z "${MODEL_ID}" ]] && continue
            echo "Syncing ${MODEL_ID} to Airtable..."
            python airtableops.py airtable-update \
              --user ersilia-os \
              --repo "${MODEL_ID}" \
              --branch main \
              --api-key "${AIRTABLE_API_KEY}" \
              || echo "WARNING: could not sync Airtable for ${MODEL_ID}"
          done < files/updated_models.txt

          rm -f airtableops.py readme_formatter.py
