name: Test Single Model

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: "Model ID to test (e.g. eos4e40)"
        required: true
        type: string

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test-model:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Setup miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          auto-activate-base: true

      - name: Install dependencies
        run: |
          conda install -y git-lfs gh jq -c conda-forge
          git-lfs install
          python -m pip install --upgrade pip
          python -m pip install 'ersilia[test] @ git+https://github.com/ersilia-os/ersilia.git'

      - name: Install Python dependencies for maintenance scripts
        run: |
          python -m pip install requests pyyaml pyairtable

      - name: Run Single Model Test
        env:
          MODEL_ID: ${{ github.event.inputs.model_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          REPO_OWNER: "ersilia-os"
          REPO_NAME: "ersilia-maintenance"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_JSON_CLEANUP: "1"
        run: |
          chmod +x scripts/test_single_model.sh
          scripts/test_single_model.sh "${MODEL_ID}"

      # Model passed: restore Status to "Ready" in the model repo metadata and
      # sync to Airtable (mirrors the failure path in test_models.yml, reversed).
      - name: Restore model status to Ready on success
        if: hashFiles('files/single_model_passed.txt') != ''
        continue-on-error: true
        env:
          MAINTENANCE_TOKEN: ${{ secrets.MAINTENANCE_TOKEN }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        run: |
          if [[ -z "${AIRTABLE_API_KEY:-}" ]]; then
            echo "AIRTABLE_API_KEY is not set, skipping Airtable update."
            exit 0
          fi

          MODEL_ID=$(cat files/single_model_passed.txt)

          if [[ -n "${MAINTENANCE_TOKEN:-}" ]]; then
            wget -q https://raw.githubusercontent.com/ersilia-os/ersilia/master/.github/scripts/airtableops.py
            wget -q https://raw.githubusercontent.com/ersilia-os/ersilia/master/.github/scripts/readme_formatter.py

            echo "Updating metadata file in ersilia-os/${MODEL_ID} to Ready"
            python src/update_model_metadata_status.py \
              --model "${MODEL_ID}" \
              --status "Ready" \
              --token "${MAINTENANCE_TOKEN}" \
              || echo "WARNING: could not update metadata file for ${MODEL_ID}"

            echo "Syncing metadata for ${MODEL_ID} to Airtable"
            python airtableops.py airtable-update \
              --user ersilia-os \
              --repo "${MODEL_ID}" \
              --branch main \
              --api-key "${AIRTABLE_API_KEY}" \
              || echo "WARNING: could not sync Airtable for ${MODEL_ID}"

            rm -f airtableops.py readme_formatter.py
          else
            echo "MAINTENANCE_TOKEN not set — updating Status directly in Airtable for ${MODEL_ID}"
            python src/update_airtable_status.py \
              --model "${MODEL_ID}" \
              --status "Ready" \
              --api-key "${AIRTABLE_API_KEY}" \
              || echo "WARNING: could not update Airtable status for ${MODEL_ID}"
          fi

      # Model passed: close any open "Failed weekly maintenance tests" issue
      # in the model repo so it doesn't stay open after the fix.
      - name: Close maintenance issue on success
        if: hashFiles('files/single_model_passed.txt') != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.MAINTENANCE_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "MAINTENANCE_TOKEN not set, skipping issue close."
            exit 0
          fi

          MODEL_ID=$(cat files/single_model_passed.txt)
          REPO="ersilia-os/${MODEL_ID}"
          ISSUE_TITLE="Failed weekly maintenance tests"

          ISSUE_NUMBER=$(gh issue list \
            --repo "${REPO}" \
            --state open \
            --json number,title \
            --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
            2>/dev/null | head -1 || true)

          if [[ -n "${ISSUE_NUMBER}" ]]; then
            echo "Closing issue #${ISSUE_NUMBER} for ${MODEL_ID}"
            gh issue close "${ISSUE_NUMBER}" \
              --repo "${REPO}" \
              --comment "Model passed the maintenance tests — closing this issue. ✅" \
              || echo "WARNING: could not close issue for ${MODEL_ID}"
          else
            echo "No open maintenance issue found for ${MODEL_ID}, nothing to close."
          fi

      # Refresh the open-issue count for the tested model in repo_info.json.
      - name: Refresh open issues for tested model
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODEL_ID="${{ github.event.inputs.model_id }}"
          echo "Refreshing open issue count for: ${MODEL_ID}"
          python src/update_open_issues.py --models "${MODEL_ID}"

      - name: Generate failing models report
        run: python src/generate_failing_models_report.py

      - name: Configure git auth for push
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name "ersilia-bot"
          git config user.email "ersilia-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            files/repo_info.json
            reports/single_model_test.md
            reports/single_model_test_summary.txt
            reports/failing_models.md
          message: "chore: single model test for ${{ github.event.inputs.model_id }}"
          push: true
          author_name: ersilia-bot
          author_email: ersilia-bot@users.noreply.github.com
          github_token: ${{ secrets.GITHUB_TOKEN }}